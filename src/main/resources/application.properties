spring.application.name=mytracks

spring.datasource.url=jdbc:postgresql://localhost:5432/mytracks
spring.datasource.username=${DB_USERNAME:mytracks}
spring.datasource.password=${DB_PASSWORD:mytracks}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.locations=classpath:db/migration

spring.security.oauth2.client.registration.google.client-id=${OAUTH2_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH2_CLIENT_SECRET}

app.frontend-url=${APP_FRONTEND_URL:/}
app.cors-allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}

spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1

server.forward-headers-strategy=native

management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health

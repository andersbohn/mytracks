apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mytracks-ingress
  namespace: mytracks
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: default-force-https@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts: [ "vpsh1.andersbohn.dk" ]
      secretName: picklist-tls
  rules:
    - host: vpsh1.andersbohn.dk
      http:
        paths:
          - path: /v1/traces
            pathType: Prefix
            backend:
              service:
                name: jaeger-otlp
                port:
                  number: 4318
          - path: /mytracks-ui
            pathType: Prefix
            backend:
              service:
                name: mytracks-ui
                port:
                  number: 80
          - path: /mytracks
            pathType: Prefix
            backend:
              service:
                name: mytracks
                port:
                  number: 80
---
# Bridges the mytracks ingress (mytracks namespace) to the shared jaeger in default namespace
apiVersion: v1
kind: Service
metadata:
  name: jaeger-otlp
  namespace: mytracks
spec:
  type: ExternalName
  externalName: jaeger-collector.default.svc.cluster.local
  ports:
    - port: 4318
      targetPort: 4318

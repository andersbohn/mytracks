apiVersion: apps/v1
kind: Deployment
metadata:
  name: mytracks
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: mytracks
  template:
    metadata:
      labels:
        app: mytracks
      annotations:
        deployment.kubernetes.io/restartedAt: RESTART_TIME_PLACEHOLDER
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: mytracks
          image: ghcr.io/OWNER_PLACEHOLDER/mytracks:TAG_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: "/mytracks"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/mytracks"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mytracks-secret
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mytracks-secret
                  key: db-password
            - name: OAUTH2_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: mytracks-secret
                  key: oauth-client-id
            - name: OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mytracks-secret
                  key: oauth-client-secret
            - name: AUTH_ALLOWED_EMAILS
              valueFrom:
                secretKeyRef:
                  name: mytracks-secret
                  key: allowed-emails
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
          readinessProbe:
            httpGet:
              path: /mytracks/actuator/health/readiness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /mytracks/actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: mytracks
spec:
  selector:
    app: mytracks
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

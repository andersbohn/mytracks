name: CI

on:
  push:
    branches: [ main ]
    tags: [ '*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Spotless check
        run: ./mvnw spotless:check

      - name: Run tests
        run: ./mvnw verify

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: npm install && npm run build
        working-directory: frontend

  deploy:
    runs-on: ubuntu-latest
    environment: vps1
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set TAG and OWNER
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.OWNER }}/mytracks:${{ env.TAG }}
          platforms: linux/arm64
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: ghcr.io/${{ env.OWNER }}/mytracks-ui:${{ env.TAG }}
          platforms: linux/arm64
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Prepare deployment manifests
        run: |
          sed -i "s/TAG_PLACEHOLDER/$TAG/g" yaml/app-deployment.yaml yaml/frontend-deployment.yaml
          sed -i "s/OWNER_PLACEHOLDER/$OWNER/g" yaml/app-deployment.yaml yaml/frontend-deployment.yaml
          sed -i "s/RESTART_TIME_PLACEHOLDER/$(date -u +'%Y-%m-%dT%H:%M:%SZ')/g" yaml/app-deployment.yaml

      - name: Create deploy dir on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p ~/deploy/mytracks

      - name: Copy manifests to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: yaml/app-deployment.yaml,yaml/frontend-deployment.yaml,yaml/traefik-ingress.yaml
          target: ~/deploy/mytracks/

      - name: Apply deployments on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            kubectl apply -f ~/deploy/mytracks/yaml/app-deployment.yaml
            kubectl apply -f ~/deploy/mytracks/yaml/frontend-deployment.yaml
            kubectl apply -f ~/deploy/mytracks/yaml/traefik-ingress.yaml
